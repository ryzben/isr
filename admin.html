<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard — Islamic School Review</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      max-width: 1200px;
      width: 100%;
    }

    /* ── Auth Screen ── */
    .auth-screen {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 3rem 2rem;
      max-width: 400px;
      margin: 0 auto;
    }

    .auth-screen h1 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: #333;
    }

    .auth-screen p {
      color: #666;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #333;
      font-size: 0.95rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.8rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .btn {
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-bottom: 1rem;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      margin-bottom: 1.5rem;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #e0e0e0;
    }

    .tab {
      padding: 0.8rem 1rem;
      background: none;
      border: none;
      font-weight: 600;
      cursor: pointer;
      color: #999;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }

    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .error {
      color: #e74c3c;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      padding: 0.8rem;
      background: #fadbd8;
      border-radius: 6px;
    }

    .success {
      color: #27ae60;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      padding: 0.8rem;
      background: #d5f4e6;
      border-radius: 6px;
    }

    /* ── Admin Dashboard ── */
    .dashboard {
      display: none;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 2rem;
    }

    .dashboard.active {
      display: block;
    }

    .dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 1.5rem;
    }

    .dashboard-header h1 {
      font-size: 2rem;
      color: #333;
    }

    .btn-logout {
      background: #e74c3c;
      color: white;
      padding: 0.6rem 1.5rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-logout:hover {
      background: #c0392b;
    }

    .schools-grid {
      display: grid;
      gap: 1.5rem;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    }

    .school-card {
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
      transition: all 0.3s;
    }

    .school-card:hover {
      border-color: #667eea;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
    }

    .school-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #f0f0f0;
    }

    .school-info {
      padding: 1.5rem;
    }

    .school-name {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #333;
    }

    .school-city {
      color: #999;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }

    .school-actions {
      display: flex;
      gap: 0.8rem;
    }

    .btn-approve {
      flex: 1;
      background: #27ae60;
      color: white;
      padding: 0.7rem 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-approve:hover {
      background: #229954;
      transform: translateY(-2px);
    }

    .btn-delete {
      flex: 1;
      background: #e74c3c;
      color: white;
      padding: 0.7rem 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-delete:hover {
      background: #c0392b;
      transform: translateY(-2px);
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #999;
    }

    .spinner {
      border: 3px solid #f0f0f0;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #999;
    }

    .empty-state h2 {
      color: #333;
      margin-bottom: 0.5rem;
    }

    @media (max-width: 768px) {
      .auth-screen {
        padding: 2rem 1.5rem;
      }

      .schools-grid {
        grid-template-columns: 1fr;
      }

      .dashboard-header {
        flex-direction: column;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Auth Screen -->
    <div class="auth-screen" id="authScreen">
      <h1>Admin Dashboard</h1>
      <p>Sign in or create account to manage schools</p>

      <div class="tabs">
        <button class="tab active" data-tab="signin">Sign In</button>
        <button class="tab" data-tab="signup">Sign Up</button>
      </div>

      <!-- Sign In Tab -->
      <div class="tab-content active" id="signin">
        <form id="signinForm">
          <div class="form-group">
            <label for="signinEmail">Email</label>
            <input type="email" id="signinEmail" required />
          </div>
          <div class="form-group">
            <label for="signinPassword">Password</label>
            <input type="password" id="signinPassword" required />
          </div>
          <button type="submit" class="btn btn-primary">Sign In</button>
          <div id="signinError"></div>
        </form>
      </div>

      <!-- Sign Up Tab -->
      <div class="tab-content" id="signup">
        <form id="signupForm">
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" required />
          </div>
          <div class="form-group">
            <label for="signupPassword">Password (min 6 characters)</label>
            <input type="password" id="signupPassword" required minlength="6" />
          </div>
          <button type="submit" class="btn btn-primary">Create Account</button>
          <div id="signupError"></div>
          <p style="font-size: 0.85rem; color: #999; margin-top: 1rem;">
            After signing up, contact the site owner to be granted admin privileges.
          </p>
        </form>
      </div>
    </div>

    <!-- Dashboard -->
    <div class="dashboard" id="dashboard">
      <div class="dashboard-header">
        <div>
          <h1>Admin Dashboard</h1>
          <p style="color: #999; font-size: 0.95rem; margin-top: 0.5rem;">
            Pending Schools for Approval
          </p>
        </div>
        <button class="btn-logout" id="logoutBtn">Logout</button>
      </div>

      <div id="schoolsList">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading pending schools...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://vprltwjduekabkizlbkv.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_NDDC-hnp-ic3n0ijcGsLSg_awOo709H';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // DOM Elements
    const authScreen = document.getElementById('authScreen');
    const dashboard = document.getElementById('dashboard');
    const signinForm = document.getElementById('signinForm');
    const signupForm = document.getElementById('signupForm');
    const logoutBtn = document.getElementById('logoutBtn');
    const schoolsList = document.getElementById('schoolsList');
    const tabs = document.querySelectorAll('.tab');

    // Tab switching
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
        
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
      });
    });

    // Sign In
    signinForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('signinEmail').value;
      const password = document.getElementById('signinPassword').value;
      const errorDiv = document.getElementById('signinError');

      try {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
      } catch (error) {
        errorDiv.innerHTML = `<div class="error">❌ ${error.message}</div>`;
      }
    });

    // Sign Up
    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const errorDiv = document.getElementById('signupError');

      try {
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) throw error;
        
        errorDiv.innerHTML = `<div class="success">✓ Account created! You'll receive a confirmation email. After confirming, contact the site owner to grant admin access.</div>`;
        signupForm.reset();
      } catch (error) {
        errorDiv.innerHTML = `<div class="error">❌ ${error.message}</div>`;
      }
    });

    // Logout
    logoutBtn.addEventListener('click', async () => {
      await supabase.auth.signOut();
    });

    // Check auth state and load dashboard
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (session?.user) {
        authScreen.style.display = 'none';
        dashboard.classList.add('active');
        await loadPendingSchools();
      } else {
        authScreen.style.display = 'block';
        dashboard.classList.remove('active');
      }
    });

    // Load pending schools
    async function loadPendingSchools() {
      try {
        const { data: schools, error } = await supabase
          .from('schools')
          .select('id, name, city, image_url')
          .eq('status', 'pending')
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (!schools || schools.length === 0) {
          schoolsList.innerHTML = `
            <div class="empty-state">
              <h2>No pending schools</h2>
              <p>All schools have been reviewed!</p>
            </div>
          `;
          return;
        }

        schoolsList.innerHTML = `
          <div class="schools-grid">
            ${schools.map(school => `
              <div class="school-card">
                <img 
                  src="${school.image_url || 'https://via.placeholder.com/300x200?text=No+Image'}" 
                  alt="${school.name}"
                  class="school-image"
                />
                <div class="school-info">
                  <div class="school-name">${school.name}</div>
                  <div class="school-city">📍 ${school.city || 'Unknown'}</div>
                  <div class="school-actions">
                    <button class="btn-approve" onclick="approveSchool('${school.id}')">
                      ✓ Approve
                    </button>
                    <button class="btn-delete" onclick="deleteSchool('${school.id}')">
                      ✕ Delete
                    </button>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      } catch (error) {
        schoolsList.innerHTML = `<div class="error">Error loading schools: ${error.message}</div>`;
      }
    }

    // Approve school
    async function approveSchool(schoolId) {
      try {
        const { error } = await supabase
          .from('schools')
          .update({ status: 'approved' })
          .eq('id', schoolId);

        if (error) throw error;
        
        // Reload list
        await loadPendingSchools();
      } catch (error) {
        alert('Error approving school: ' + error.message);
      }
    }

    // Delete school
    async function deleteSchool(schoolId) {
      if (!confirm('Are you sure you want to delete this school?')) return;

      try {
        const { error } = await supabase
          .from('schools')
          .delete()
          .eq('id', schoolId);

        if (error) throw error;
        
        // Reload list
        await loadPendingSchools();
      } catch (error) {
        alert('Error deleting school: ' + error.message);
      }
    }

    // Check initial auth state
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        authScreen.style.display = 'none';
        dashboard.classList.add('active');
        loadPendingSchools();
      }
    });
  </script>
</body>
</html>
