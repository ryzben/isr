<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Islamic School Review</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; }

    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0F5132 0%, #1d7a4e 100%);
    }
    .auth-box {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .auth-box h1 { font-size: 1.5rem; margin-bottom: 6px; }
    .auth-box p { color: #666; font-size: 0.9rem; margin-bottom: 28px; }
    .auth-box input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #ddd; border-radius: 8px;
      font: inherit; font-size: 1rem;
      margin-bottom: 14px; outline: none;
    }
    .auth-box input:focus { border-color: #0F5132; }
    .auth-box button {
      width: 100%; padding: 12px;
      background: #0F5132; color: #fff;
      border: none; border-radius: 8px;
      font: inherit; font-size: 1rem; font-weight: 600;
      cursor: pointer;
    }
    .auth-error { color: #c0392b; font-size: 0.88rem; margin-top: 10px; }

    .dash { display: none; }
    .dash.active { display: block; }
    .topbar {
      background: #0F5132; color: #fff;
      padding: 14px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar h1 { font-size: 1.1rem; font-weight: 600; }
    .topbar button {
      background: rgba(255,255,255,0.15); border: none; color: #fff;
      padding: 6px 16px; border-radius: 6px;
      cursor: pointer; font: inherit; font-size: 0.88rem;
    }

    .main { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

    .tabs { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 2px solid #e5e7eb; }
    .tab-btn {
      padding: 10px 20px; background: none; border: none;
      font: inherit; font-size: 0.95rem; font-weight: 500;
      color: #6b7280; cursor: pointer;
      border-bottom: 3px solid transparent; margin-bottom: -2px;
    }
    .tab-btn.active { color: #0F5132; border-bottom-color: #0F5132; font-weight: 600; }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .card {
      background: #fff; border-radius: 12px;
      padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 20px; color: #0F5132; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: 0.85rem; font-weight: 600; color: #374151; }
    .field-hint { font-size: 0.78rem; color: #9ca3af; font-weight: 400; }
    .field input, .field select, .field textarea {
      padding: 10px 12px;
      border: 1.5px solid #d1d5db; border-radius: 8px;
      font: inherit; font-size: 0.95rem; outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: #0F5132; }
    .field textarea { resize: vertical; min-height: 100px; }

    .btn-publish {
      background: #0F5132; color: #fff;
      border: none; border-radius: 8px;
      padding: 13px 32px;
      font: inherit; font-size: 1rem; font-weight: 600;
      cursor: pointer; width: 100%; margin-top: 8px;
    }
    .btn-publish:hover { background: #0a3d25; }
    .btn-publish:disabled { opacity: 0.6; cursor: not-allowed; }

    .status-msg {
      margin-top: 14px; padding: 12px 16px;
      border-radius: 8px; font-size: 0.92rem; display: none;
    }
    .status-msg.success { background: #d1fae5; color: #065f46; display: block; }
    .status-msg.error   { background: #fee2e2; color: #991b1b; display: block; }

    .school-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border: 1px solid #e5e7eb;
      border-radius: 8px; margin-bottom: 10px; background: #fff;
    }
    .school-row__info h3 { font-size: 0.95rem; margin-bottom: 2px; }
    .school-row__info p { font-size: 0.82rem; color: #6b7280; }
    .school-row__actions { display: flex; gap: 8px; }
    .btn-edit {
      background: #e0f2fe; color: #075985;
      border: none; border-radius: 6px;
      padding: 6px 14px; font: inherit; font-size: 0.82rem;
      font-weight: 600; cursor: pointer;
    }
    .btn-edit:hover { background: #bae6fd; }
    .btn-delete {
      background: #fee2e2; color: #991b1b;
      border: none; border-radius: 6px;
      padding: 6px 14px; font: inherit; font-size: 0.82rem;
      font-weight: 600; cursor: pointer;
    }
    .btn-delete:hover { background: #fca5a5; }
    .edit-banner {
      background: #fffbeb; border: 1px solid #fcd34d;
      border-radius: 8px; padding: 10px 16px;
      font-size: 0.88rem; color: #92400e;
      display: none; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .edit-banner.active { display: flex; }
    .edit-banner button {
      background: none; border: none; color: #92400e;
      font: inherit; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; text-decoration: underline;
    }
    .sub-card {
      border: 1px solid #e5e7eb; border-radius: 10px;
      padding: 18px 20px; margin-bottom: 14px; background: #fff;
    }
    .sub-card__header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
    .sub-card__name { font-size: 1rem; font-weight: 700; margin-bottom: 2px; }
    .sub-card__meta { font-size: 0.82rem; color: #6b7280; }
    .sub-card__body { font-size: 0.88rem; color: #374151; margin-bottom: 12px; line-height: 1.5; }
    .sub-card__photos { display: flex; gap: 8px; margin-bottom: 12px; }
    .sub-card__photos img { width: 72px; height: 56px; object-fit: cover; border-radius: 6px; border: 1px solid #e5e7eb; }
    .sub-card__contact { font-size: 0.82rem; color: #6b7280; margin-bottom: 12px; }
    .sub-card__actions { display: flex; gap: 8px; }
    .btn-approve {
      background: #d1fae5; color: #065f46;
      border: none; border-radius: 6px;
      padding: 7px 18px; font: inherit; font-size: 0.88rem;
      font-weight: 600; cursor: pointer;
    }
    .btn-approve:hover { background: #a7f3d0; }
    .btn-reject {
      background: #f3f4f6; color: #6b7280;
      border: none; border-radius: 6px;
      padding: 7px 14px; font: inherit; font-size: 0.88rem;
      font-weight: 600; cursor: pointer;
    }
    .btn-reject:hover { background: #e5e7eb; }
    .empty { text-align: center; padding: 40px; color: #9ca3af; }
  </style>
</head>
<body>

<div class="auth-wrap" id="authWrap">
  <div class="auth-box">
    <h1>ISR Admin</h1>
    <p>Enter your admin password to continue.</p>
    <input type="password" id="adminPass" placeholder="Password" />
    <button onclick="checkPass()">Sign In</button>
    <p class="auth-error" id="authError"></p>
  </div>
</div>

<div class="dash" id="dash">
  <div class="topbar">
    <h1>ISR Admin Dashboard</h1>
    <button onclick="signOut()">Sign Out</button>
  </div>

  <div class="main">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('add', this)">Add School</button>
      <button class="tab-btn" onclick="switchTab('list', this)">All Schools</button>
      <button class="tab-btn" onclick="switchTab('pending', this)">Pending <span id="pendingBadge" style="display:none;background:#ef4444;color:#fff;border-radius:99px;padding:1px 7px;font-size:0.75rem;margin-left:4px;"></span></button>
    </div>

    <div class="tab-pane active" id="tab-add">
      <div class="card">
        <div class="edit-banner" id="editBanner">
          <span>Editing: <strong id="editBannerName"></strong></span>
          <button onclick="cancelEdit()">✕ Cancel edit</button>
        </div>
        <h2 id="formTitle">Publish a New School</h2>
        <div class="grid-2">
          <div class="field">
            <label>School Name *</label>
            <input type="text" id="f-name" placeholder="Al-Furqan Academy" />
          </div>
          <div class="field">
            <label>URL Slug * <span class="field-hint">(auto-generated)</span></label>
            <input type="text" id="f-id" placeholder="al-furqan-academy" />
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label>City *</label>
            <input type="text" id="f-city" placeholder="Jacksonville" />
          </div>
          <div class="field">
            <label>State * <span class="field-hint">(2-letter)</span></label>
            <input type="text" id="f-state" placeholder="FL" maxlength="2" style="text-transform:uppercase" />
          </div>
        </div>
        <div class="field">
          <label>Address</label>
          <input type="text" id="f-address" placeholder="123 Main St, Jacksonville, FL 32204" />
        </div>
        <div class="grid-2">
          <div class="field">
            <label>Phone</label>
            <input type="text" id="f-phone" placeholder="(904) 123-4567" />
          </div>
          <div class="field">
            <label>Website</label>
            <input type="url" id="f-website" placeholder="https://school.org" />
          </div>
        </div>
        <div class="grid-2">
          <div class="field">
            <label>Grades</label>
            <input type="text" id="f-grades" placeholder="PreK–12" />
          </div>
          <div class="field">
            <label>Tuition Range</label>
            <input type="text" id="f-tuition" placeholder="$8,000/yr" />
          </div>
        </div>
        <div class="field">
          <label>Description</label>
          <textarea id="f-desc" placeholder="Brief description of the school..."></textarea>
        </div>
        <div class="field">
          <label>Photo URL</label>
          <input type="url" id="f-photo" placeholder="https://..." />
        </div>
        <div class="grid-2">
          <div class="field">
            <label>Accreditation</label>
            <input type="text" id="f-accred" placeholder="AdvancED, SACS..." />
          </div>
          <div class="field">
            <label>Enrollment</label>
            <input type="text" id="f-enrollment" placeholder="250 students" />
          </div>
        </div>
        <div class="field">
          <label>Verified listing?</label>
          <select id="f-verified">
            <option value="false">No</option>
            <option value="true">Yes — show verified badge</option>
          </select>
        </div>
        <button class="btn-publish" id="publishBtn" onclick="publishSchool()">Publish School</button>
        <div class="status-msg" id="statusMsg"></div>
      </div>
    </div>

    <div class="tab-pane" id="tab-list">
      <div class="card">
        <h2>All Schools (<span id="schoolCount">0</span>)</h2>
        <div id="schoolsList"><div class="empty">Loading...</div></div>
      </div>
    </div>

    <div class="tab-pane" id="tab-pending">
      <div class="card">
        <h2>Pending Submissions (<span id="pendingCount">0</span>)</h2>
        <div id="pendingList"><div class="empty">Loading...</div></div>
      </div>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://vprltwjduekabkizlbkv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwcmx0d2pkdWVrYWJraXpsYmt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NDE3MzEsImV4cCI6MjA5MzIxNzczMX0.oHNRX6q9jXbR8W3yULzWf1bstHVulYJOGghmthQazTA';
  const ADMIN_PASS  = 'isr-admin-2026';

  let editingId   = null;   // null = publish mode, string = edit mode (school id)
  let schoolsCache = {};    // id → school object, populated by loadSchools

  function checkPass() {
    if (document.getElementById('adminPass').value === ADMIN_PASS) {
      document.getElementById('authWrap').style.display = 'none';
      document.getElementById('dash').classList.add('active');
      loadSchools();
      loadPendingBadge();
    } else {
      document.getElementById('authError').textContent = 'Incorrect password.';
    }
  }
  document.getElementById('adminPass').addEventListener('keydown', e => { if (e.key === 'Enter') checkPass(); });

  function signOut() {
    document.getElementById('authWrap').style.display = 'flex';
    document.getElementById('dash').classList.remove('active');
    document.getElementById('adminPass').value = '';
  }

  function switchTab(name, btn) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    btn.classList.add('active');
    if (name === 'list')    loadSchools();
    if (name === 'pending') loadPending();
  }

  document.getElementById('f-name').addEventListener('input', function() {
    document.getElementById('f-id').value = this.value.toLowerCase().trim()
      .replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-');
  });

  function editSchool(id) {
    const s = schoolsCache[id];
    if (!s) return;
    editingId = id;

    // Populate form
    document.getElementById('f-name').value       = s.name        || '';
    document.getElementById('f-id').value         = s.id          || '';
    document.getElementById('f-city').value       = s.city        || '';
    document.getElementById('f-state').value      = s.state       || '';
    document.getElementById('f-address').value    = s.address     || '';
    document.getElementById('f-phone').value      = s.phone       || '';
    document.getElementById('f-website').value    = s.website     || '';
    document.getElementById('f-grades').value     = s.grades      || '';
    document.getElementById('f-tuition').value    = s.tuition_range || '';
    document.getElementById('f-desc').value       = s.description || '';
    document.getElementById('f-photo').value      = s.photo_url   || '';
    document.getElementById('f-accred').value     = s.accreditation || '';
    document.getElementById('f-enrollment').value = s.enrollment  || '';
    document.getElementById('f-verified').value   = s.verified ? 'true' : 'false';
    document.getElementById('f-id').readOnly      = true;

    // Switch UI to edit mode
    document.getElementById('formTitle').textContent    = 'Edit School';
    document.getElementById('publishBtn').textContent   = 'Save Changes';
    document.getElementById('editBannerName').textContent = s.name;
    document.getElementById('editBanner').classList.add('active');
    document.getElementById('statusMsg').className = 'status-msg';

    // Switch to Add tab
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-add').classList.add('active');
    document.querySelector('.tab-btn').classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cancelEdit() {
    editingId = null;
    document.getElementById('formTitle').textContent  = 'Publish a New School';
    document.getElementById('publishBtn').textContent = 'Publish School';
    document.getElementById('editBanner').classList.remove('active');
    document.getElementById('f-id').readOnly = false;
    document.querySelectorAll('#tab-add input, #tab-add textarea').forEach(el => el.value = '');
    document.getElementById('f-verified').value = 'false';
    document.getElementById('statusMsg').className = 'status-msg';
  }

  async function publishSchool() {
    const btn = document.getElementById('publishBtn');
    const msg = document.getElementById('statusMsg');
    msg.className = 'status-msg';

    const school = {
      id:            document.getElementById('f-id').value.trim(),
      name:          document.getElementById('f-name').value.trim(),
      city:          document.getElementById('f-city').value.trim(),
      state:         document.getElementById('f-state').value.trim().toUpperCase(),
      address:       document.getElementById('f-address').value.trim() || null,
      phone:         document.getElementById('f-phone').value.trim() || null,
      website:       document.getElementById('f-website').value.trim() || null,
      grades:        document.getElementById('f-grades').value.trim() || null,
      tuition_range: document.getElementById('f-tuition').value.trim() || null,
      description:   document.getElementById('f-desc').value.trim() || null,
      photo_url:     document.getElementById('f-photo').value.trim() || null,
      accreditation: document.getElementById('f-accred').value.trim() || null,
      enrollment:    document.getElementById('f-enrollment').value.trim() || null,
      verified:      document.getElementById('f-verified').value === 'true',
    };

    if (!school.id || !school.name || !school.city || !school.state) {
      msg.className = 'status-msg error';
      msg.textContent = 'Name, slug, city and state are required.';
      return;
    }

    btn.disabled = true;
    btn.textContent = editingId ? 'Saving...' : 'Publishing...';

    try {
      let res;
      if (editingId) {
        // PATCH existing school (exclude id from body)
        const { id, ...updates } = school;
        res = await fetch(`${SUPABASE_URL}/rest/v1/schools?id=eq.${editingId}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify(updates),
        });
      } else {
        // POST new school
        res = await fetch(`${SUPABASE_URL}/rest/v1/schools`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`,
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify(school),
        });
      }

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || err.details || (editingId ? 'Failed to save' : 'Failed to publish'));
      }

      msg.className = 'status-msg success';
      msg.textContent = editingId
        ? '✓ "' + school.name + '" updated successfully!'
        : '✓ "' + school.name + '" published and live on the site!';

      cancelEdit();

    } catch (err) {
      msg.className = 'status-msg error';
      msg.textContent = err.message;
    } finally {
      btn.disabled = false;
      btn.textContent = editingId ? 'Save Changes' : 'Publish School';
    }
  }

  async function loadSchools() {
    const list = document.getElementById('schoolsList');
    list.innerHTML = '<div class="empty">Loading...</div>';
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/schools?order=name.asc`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
      });
      const schools = await res.json();
      schoolsCache = {};
      schools.forEach(s => schoolsCache[s.id] = s);
      document.getElementById('schoolCount').textContent = schools.length;
      if (!schools.length) { list.innerHTML = '<div class="empty">No schools yet.</div>'; return; }
      list.innerHTML = schools.map(s => `
        <div class="school-row">
          <div class="school-row__info">
            <h3>${s.name}${s.verified ? ' ✓' : ''}</h3>
            <p>${s.city}, ${s.state} · ${s.grades || 'Grades not listed'}</p>
          </div>
          <div class="school-row__actions">
            <button class="btn-edit" onclick="editSchool('${s.id}')">Edit</button>
            <button class="btn-delete" onclick="deleteSchool('${s.id}', '${s.name.replace(/'/g,"\\'")}', this)">Delete</button>
          </div>
        </div>
      `).join('');
    } catch (err) {
      list.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
    }
  }

  async function deleteSchool(id, name, btn) {
    if (!confirm('Delete "' + name + '"? This cannot be undone.')) return;
    btn.disabled = true; btn.textContent = 'Deleting...';
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/schools?id=eq.${id}`, {
        method: 'DELETE',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `Delete failed (${res.status})`);
      }
      loadSchools();
    } catch (err) {
      alert('Delete failed: ' + err.message);
      btn.disabled = false; btn.textContent = 'Delete';
    }
  }

  async function loadPendingBadge() {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/school_submissions?status=eq.pending&select=id`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Prefer': 'count=exact' } }
      );
      const count = parseInt(res.headers.get('content-range')?.split('/')[1] || '0', 10);
      const badge = document.getElementById('pendingBadge');
      if (count > 0) { badge.textContent = count; badge.style.display = 'inline'; }
      else { badge.style.display = 'none'; }
    } catch {}
  }

  async function loadPending() {
    const list = document.getElementById('pendingList');
    list.innerHTML = '<div class="empty">Loading...</div>';
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/school_submissions?status=eq.pending&order=created_at.asc`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
      );
      const subs = await res.json();
      document.getElementById('pendingCount').textContent = subs.length;
      if (!subs.length) { list.innerHTML = '<div class="empty">No pending submissions.</div>'; return; }
      list.innerHTML = subs.map(s => {
        const photos = [s.photo_url_1, s.photo_url_2, s.photo_url_3].filter(Boolean);
        const date   = new Date(s.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        return `
          <div class="sub-card" id="sub-${s.id}">
            <div class="sub-card__header">
              <div>
                <div class="sub-card__name">${s.school_name}</div>
                <div class="sub-card__meta">${s.city}, ${s.state} · Submitted ${date}</div>
              </div>
            </div>
            ${s.description ? `<div class="sub-card__body">${s.description}</div>` : ''}
            ${photos.length ? `<div class="sub-card__photos">${photos.map(u => `<img src="${u}" alt="photo">`).join('')}</div>` : ''}
            <div class="sub-card__contact">
              Contact: <strong>${s.contact_name}</strong> · <a href="mailto:${s.contact_email}">${s.contact_email}</a>
              ${s.phone ? ' · ' + s.phone : ''}
              ${s.website ? ' · <a href="' + s.website + '" target="_blank">' + s.website + '</a>' : ''}
              ${s.programs ? '<br>Programs: ' + s.programs : ''}
            </div>
            <div class="sub-card__actions">
              <button class="btn-approve" onclick="approveSubmission('${s.id}', this)">✓ Publish to directory</button>
              <button class="btn-reject"  onclick="rejectSubmission('${s.id}', this)">Reject</button>
            </div>
          </div>`;
      }).join('');
    } catch (err) {
      list.innerHTML = `<div class="empty">Error: ${err.message}</div>`;
    }
  }

  async function approveSubmission(id, btn) {
    btn.disabled = true; btn.textContent = 'Publishing…';
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/school_submissions?id=eq.${id}`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
      );
      const [s] = await res.json();
      if (!s) throw new Error('Submission not found');

      const slug = s.school_name.toLowerCase().trim()
        .replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-');

      const publishRes = await fetch(`${SUPABASE_URL}/rest/v1/schools`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({
          id         : slug,
          name       : s.school_name,
          city       : s.city,
          state      : s.state,
          phone      : s.phone      || null,
          website    : s.website    || null,
          description: s.description || null,
          photo_url  : s.photo_url_1 || null,
          verified   : false,
        }),
      });
      if (!publishRes.ok) {
        const err = await publishRes.json().catch(() => ({}));
        throw new Error(err.message || err.details || 'Publish failed');
      }

      await fetch(`${SUPABASE_URL}/rest/v1/school_submissions?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({ status: 'published' }),
      });

      document.getElementById('sub-' + id).remove();
      loadPendingBadge();
      const remaining = document.querySelectorAll('[id^="sub-"]').length;
      document.getElementById('pendingCount').textContent = remaining;
      if (!remaining) document.getElementById('pendingList').innerHTML = '<div class="empty">No pending submissions.</div>';

    } catch (err) {
      alert('Publish failed: ' + err.message);
      btn.disabled = false; btn.textContent = '✓ Publish to directory';
    }
  }

  async function rejectSubmission(id, btn) {
    if (!confirm('Reject this submission? It will be hidden from the inbox.')) return;
    btn.disabled = true; btn.textContent = 'Rejecting…';
    try {
      await fetch(`${SUPABASE_URL}/rest/v1/school_submissions?id=eq.${id}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Prefer': 'return=minimal',
        },
        body: JSON.stringify({ status: 'rejected' }),
      });
      document.getElementById('sub-' + id).remove();
      loadPendingBadge();
      const remaining = document.querySelectorAll('[id^="sub-"]').length;
      document.getElementById('pendingCount').textContent = remaining;
      if (!remaining) document.getElementById('pendingList').innerHTML = '<div class="empty">No pending submissions.</div>';
    } catch (err) {
      alert('Reject failed: ' + err.message);
      btn.disabled = false; btn.textContent = 'Reject';
    }
  }
</script>
</body>
