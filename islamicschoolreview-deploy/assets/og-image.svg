<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F5132"/>
      <stop offset="1" stop-color="#1d7a4e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#B8823A" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#B8823A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- brand mark -->
  <g transform="translate(80, 70)">
    <rect width="80" height="80" rx="18" fill="#fff"/>
    <text x="40" y="51" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="28" letter-spacing="0.5" fill="#0F5132" text-anchor="middle">ISR</text>
  </g>
  <text x="180" y="125" font-family="Inter, sans-serif" font-size="28" font-weight="500" fill="#fff">Islamic School Review</text>

  <!-- headline -->
  <text x="80" y="280" font-family="Georgia, 'Times New Roman', serif" font-weight="600" font-size="76" fill="#fff">
    Find the best Islamic
  </text>
  <text x="80" y="370" font-family="Georgia, 'Times New Roman', serif" font-weight="600" font-size="76" fill="#fff">
    school for your child.
  </text>

  <!-- subhead -->
  <text x="80" y="450" font-family="Inter, sans-serif" font-size="28" fill="rgba(255,255,255,0.85)">
    Honest parent reviews · 2,400+ verified schools · tuition, Quran, admissions.
  </text>

  <!-- trust row -->
  <g transform="translate(80, 510)">
    <text x="0" y="40" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#fff">2,400+</text>
    <text x="0" y="70" font-family="Inter, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)">Verified schools</text>

    <text x="280" y="40" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#fff">18,000</text>
    <text x="280" y="70" font-family="Inter, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)">Parent reviews</text>

    <text x="560" y="40" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#fff">92%</text>
    <text x="560" y="70" font-family="Inter, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)">School response rate</text>
  </g>

  <!-- accent strip -->
  <rect x="0" y="614" width="1200" height="16" fill="#B8823A"/>
</svg>
